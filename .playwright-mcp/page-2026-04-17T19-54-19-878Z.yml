                  - generic [ref=e354]: Public · 9,3 K membres
                  - generic [ref=e357]: "Looking for a place to ask questions, or discuss the links between spirituality, mental health, mysticism, and metaphysics? This is the place! Searching to find others you can talk about things that aren't considered ordinary? Are you looking to learn more about, or share your experiences with the extraordinary? Are you finding your spirituality, healing from mental health concerns, exploring a spiritual path, looking to understand how these things relate, or hoping to deepen your connection with your religion or personal beliefs? Here is the place...!! ____________________________________________________ ALSO, FOR THOSE INTERESTED IN THIS GROUP: Check out Mike Ray's new book, 'Ordo Divinorum Illuminus: The Order of Divine Illumination' if you are interested in any of the topics of this group. If you are seeking secret knowledge, spiritual guidance, protection from spiritual warfare, to advance your spiritual connection and find help along your journey, or seeking 'sacred mysteries', this is the book for you! It acts as both a spiritual guide and source of insight and Light for readers. ____________________________________________________ What are some challenges you may be facing? What are some ways you can turn those challenges into new opportunities to flourish in another area or aspect of life? What hidden talents do you have that or lying dormant within you, waiting to be awoken? Just to make a few scriptural references ‘Seek, and ye shall find’! “But behold, if ye will awake and arouse your faculties, even to an experiment upon my words, and exercise a particle of faith, yea, even if ye can no more than desire to believe, let this desire work in you, even until ye believe in a manner that ye can give place for a portion of my words.” (Alma 32:27) -What have you got to lose? And what might you stand to gain? ____________________________________________________ ____________________________________________________ *This is the place for those who wish to learn from and to teach one another, and anyone else who is a seeker of truth.* ____________________________________________________ ____________________________________________________ “Man is part of a race of souls not a race of bodies. Primarily. His true integration is upon a soul level. His true humanity is upon a soul level. And until he is a living soul working in a body, he has not achieved his own humanity” —Manly P. Hall “Medicine rests upon four pillars philosophy, astronomy, alchemy, and ethics.” -Paracelsus \"The most virtuous are those who content themselves with being virtuous without seeking to appear so\". -Plato ____________________________________________________ ____________________________________________________ ***WE OFFER ONLINE CLASSES AND OPEN DISCUSSIONS, AS WELL AS A MENTORSHIP PROGRAM THROUGH THIS GROUP. Message a group admin for more info! *** Hope to see you on the group!! 🙏 Your admins, —Mike Ray & Denise Ray"
