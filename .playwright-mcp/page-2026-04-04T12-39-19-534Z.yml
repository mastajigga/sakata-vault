        - heading "L'Héritage de Ntotila" [level=2] [ref=e74]
        - text: C'était au temps où les vents portaient encore le souffle de
        - strong [ref=e75]: Lukeni lua Nimi
        - text: . Notre peuple, issu des grandes vagues migratoires Bantoues, a quitté les terres du Sud pour chercher la brume protectrice du fleuve-mère.
        - text: Les chroniques de nos anciens, transmises sous l'arbre à palabres, racontent comment les clans Sakata se sont détachés de l'orbite de l'Empire pour forger leur propre destin dans l'entre-deux des rivières Fimi et Lukenie.
        - heading "La Brume comme Bouclier" [level=2] [ref=e76]
        - text: Pourquoi le Mai-Ndombe? Parce que l'eau y est noire de sagesse et que la forêt y est si dense qu'elle cache les secrets de ceux qui savent écouter. Les Sakata ne sont pas simplement des habitants de la forêt; ils sont les gardiens de l'équilibre entre la terre ferme et les eaux mouvantes.
