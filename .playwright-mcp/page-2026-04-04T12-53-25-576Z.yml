    - generic [ref=e71]:
      - generic [ref=e73]:
        - text: "> *“Mai masɛli masɛli, kasi makoki kokata zamba te.”*"
        - text: "> — L’eau coule doucement, mais elle ne peut pas couper la forêt."
        - text: "> — Proverbe de nos ancêtres qui nous rappelle que la patience et la souplesse de l’eau sont nos plus grandes forces."
        - text: Écoute, mon enfant, car ce que je vais te dire n’est pas écrit dans les livres des Blancs. C’est une parole qui a voyagé sur les pirogues, qui a dormi sous les feuilles de bananier et qui s'est transmise comme le feu d'un foyer à un autre. Notre histoire ne commence pas ici, dans la brume du lac Mai-Ndombe. Elle commence bien plus loin, là où le soleil se lève sur les collines de l'ancien *Kongo di Ntotila* (Royaume du Kongo).
        - text: "#"
        - heading "Le Départ de la Terre Mère" [level=2] [ref=e74]
        - text: Il y a de cela des siècles, bien avant que les navires aux grandes voiles blanches n'apparaissent à l'horizon, une grande agitation s'emparait des clans de Mpemba Kasi. Nous étions une branche d'un grand arbre, une pousse vigoureuse qui cherchait son propre espace pour s'épanouir. On raconte que c'est une vision, un rêve partagé par nos *bakambi* (anciens), qui nous a poussés à regarder vers le nord-est.
        - text: Le voyage fut long, plus long que la mémoire d'un seul homme. Nous avons marché à travers les savanes, là où l'herbe est haute comme un guerrier, et nous avons pénétré dans la grande forêt qui ne finit jamais. À chaque étape, nous laissions une trace, un nom, une graine. Les Sakata ne fuyaient pas ; ils cherchaient la terre qui les reconnaîtrait.
        - text: "#"
        - heading "La Traversée de la Lukenie" [level=2] [ref=e75]
        - text: Lorsque nous sommes arrivés au bord de la Lukenie, la rivière était en colère. Les eaux étaient sombres et les courants tiraient vers les profondeurs. C'est là que le miracle s'est produit. On dit que le grand esprit de la forêt, l' *eloko*, s'est manifesté sous la forme d'un banc de poissons d'argent pour nous montrer le gué. Nos ancêtres ont réalisé alors que cette terre n'était pas hostile, elle était une mère qui nous attendait.
        - text: Nous avons traversé, portant nos enfants sur nos épaules et nos semences dans des paniers de raphia. De l'autre côté, la forêt était plus dense, plus fraîche. Les arbres semblaient nous murmurer leurs noms. C'est ici, entre la Lukenie et la Fimi, que nous avons posé nos premiers *mboka* (villages).
        - text: "#"
        - heading "L'Alliance avec la Brume" [level=2] [ref=e76]
        - text: Pourquoi avons-nous choisi cette région de lacs et de marécages ? Parce que la brume est le manteau des ancêtres. Elle nous protège des regards indiscrets et garde nos secrets au chaud. Dans le Mai-Ndombe, l'eau et la terre se marient chaque matin. Pour un Sakata, être chez soi, c'est sentir l'humidité de la forêt sur sa peau dès le réveil.
        - text: Nous sommes devenus les maîtres de la pirogue et les seigneurs de la récolte forestière. Nous avons appris à parler aux arbres et à lire les signes dans le vol des oiseaux. Notre structure sociale, matrilinéaire et respectueuse, s'est solidifiée comme les racines d'un vieux baobab. Nous venions du Grand Kongo, mais nous étions nés à nouveau dans la brume.
        - text: "#"
        - heading "Aujourd'hui et demain" [level=2] [ref=e77]
        - text: Aujourd'hui, alors que nos enfants partent vers les grandes villes comme Kinshasa ou traversent les océans vers l'Europe, ils portent en eux cette trace de terre mouillée. Peu importe où tu te trouves, souviens-toi que tu es le fils de ceux qui ont traversé la Lukenie. Ton sang porte le rythme des rames sur l'eau et la patience de la forêt. Ne laisse pas la rivière de ta mémoire s'assécher.
        - text: "[Écrit] Vansina, J., \"Les anciens royaumes de la savane\", IRES, 1965"
        - text: "[Oral] Mokambi Balinga, Village Semendua, 1982"
        - text: "[Terrain] Enquête ethnographique Sakata, Archive Kisakata, 2024"
