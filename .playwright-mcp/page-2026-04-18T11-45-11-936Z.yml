                - generic [ref=e2762]:
                  - generic [ref=e2764]: "LES SAKATA : GARDIENS DU FLEUVE ET DU SAVOIR ANCESTRAL"
                  - generic [ref=e2958]: Le peuple Sakata est l’un des plus anciens habitants du territoire de Kutu, au sud du lac Mai-Ndombe. Leur nom, selon certains chercheurs, viendrait du mot “nsaka”, qui signifie “assemblée” ou “réunion” en kikongo rappelant la structure communautaire forte de ce peuple attaché à la parole et au consensus.
                  - generic [ref=e2960]: Les traditions orales sakata racontent que leurs ancêtres viendraient du nord-ouest du Congo, probablement du bassin du fleuve Congo, avant de s’établir entre les rivières Fimi, Lukenie et Mfimi.
                  - generic [ref=e2962]: Ces migrations, qui remontent à plusieurs siècles, furent motivées par la recherche de terres fertiles, de forêts abondantes et d’un espace paisible pour vivre loin des conflits interethniques.
                  - generic [ref=e2964]: Ils s’installèrent dans les zones fluviales, construisant des villages sur pilotis et développant une relation intime avec l’eau, qu’ils considèrent comme sacrée.
                  - generic [ref=e2966]: Sur le plan culturel, les Sakata se distinguent par une société hiérarchisée autour du chef coutumier, détenteur de l’autorité spirituelle et politique.
                  - generic [ref=e2967]:
                    - generic [ref=e2968]: "La transmission du savoir s’effectue par la parole : proverbes, contes, chants et danses sont autant de moyens d’éducation."
                    - generic [ref=e2969]: "Chez les Sakata, la parole donnée a valeur de loi. C’est pourquoi on dit souvent :"
                    - generic [ref=e2970]: “Sakata azali moto ya lokumu na maloba” — le Sakata est un homme d’honneur dans ses paroles.
                  - generic [ref=e2972]: Leur langue, le kisakata, fait partie du grand groupe bantou et partage des similitudes avec le kikongo et le teke. Elle véhicule une riche symbolique et reste aujourd’hui un marqueur identitaire fort, même chez les jeunes qui migrent vers Kinshasa.
                  - generic [ref=e2974]: Les Sakata croient en un monde spirituel peuplé d’ancêtres protecteurs. Leurs rites initiatiques — tels que le ngongo pour les jeunes garçons — visent à transmettre le respect, le courage et la discipline. La danse et le tambour accompagnent ces cérémonies, transformant chaque initiation en un moment de renaissance.
                  - generic [ref=e2976]: Aujourd’hui, bien que leur ancrage historique demeure dans la province du Mai-Ndombe (ancien Grand Bandundu), on retrouve également des communautés sakata dans d’autres provinces de la République Démocratique du Congo, notamment au Kwilu, au Kwango, ainsi qu’au Kasaï-Central et au Kasaï-Oriental, suite aux migrations internes liées au travail, aux mariages et aux dynamiques économiques.
                  - generic [ref=e2978]:
                    - text: Fiers de leurs origines, les Sakata ont su préserver leur identité malgré le passage du temps. Leur territoire, leurs traditions et leur attachement à la nature font d’eux de véritables gardiens du fleuve et du savoir ancestral.
