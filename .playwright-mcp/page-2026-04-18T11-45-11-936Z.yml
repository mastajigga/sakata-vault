                - generic [ref=e1724]:
                  - generic [ref=e1726]: "𝗠𝗔𝗠𝗔 𝗠𝗔𝗙𝗨𝗧𝗔 𝗘𝗧 𝗠𝗔𝗠𝗔 𝗠𝗩𝗜𝗧𝗔 𝗞𝗜𝗠𝗣𝗔 :"
                  - generic [ref=e1728]: MAMAN MAFUTA avait fait un travail important en préparant l’arrivée de MAMAN KIMPA-VITA. Cette dernière avait été initiée très jeune par Mama Mafuta Fumaria, une prophétesse de Mbanza Kongo qui avait choisi de se retirer de la société. Sa mission était d’aider les gens à se libérer des forces du mal grâce à des cérémonies d’exorcisme appelées « MBUMBA KINDONGA ».
                  - generic [ref=e2908]: Pour les missionnaires occidentaux, la société KIMPASI pratiquait la sorcellerie, et ils avaient détruit la plupart de leurs temples dans la forêt, notamment les capucins. De leur côté, les membres de la société KIMPASI voyaient les prêtres capucins comme des sorciers.
                  - generic [ref=e2910]: Les prédications de Maman MAFUTA ont rencontré un grand succès car beaucoup de noirs ont cru en elle et ont quitté les églises catholiques, ce qui a déplu aux prêtres capucins.
                  - generic [ref=e2912]: Mama Vita Kimpa est devenue très populaire, et les gens la suivaient partout où elle allait.
                  - generic [ref=e2914]: Après avoir éveillé spirituellement le peuple, elle a encouragé le retour à la religion ancestrale. Cela a provoqué un recul du christianisme, et les gens sont revenus à leurs pratiques traditionnelles. En apprenant cela, le clergé chrétien a commencé à préparer sa mort.
                  - generic [ref=e2916]: La fusion du groupe de Mama Mafuta et de celui de Mama MVita Kimpa a donné naissance à un seul groupe suivant les traditions ancestrales. À ce moment-là, Mama Mafuta était trop âgée pour se déplacer, alors Mama MVita Kimpa a continué à prêcher et à enseigner. Beaucoup ont été convaincus par son travail, les symboles de pouvoir ont été retrouvés, et les conflits entre groupes ont cessé.
                  - generic [ref=e2918]: Mama MVita Kimpa a calmé les tensions et a guidé les deux rois. Elle a reconstruit la ville de Mbanza Kongo, même si les Portugais l’avaient interdite. Aucun homme noir n’était autorisé à entrer dans cette ville détruite depuis qu’elle avait été brûlée.
                  - generic [ref=e2920]: Le moment est finalement arrivé pour choisir un roi. Elle a demandé à tous les chefs de clans de proposer un candidat, pour que le choix soit juste. Les candidats devaient ensuite jeûner pendant 40 jours.
                  - generic [ref=e2922]: Les groupes se sont séparés, et le groupe de Vita Kimpa est allé profondément dans la forêt pour jeûner. Quand les colons ont appris cela, ils ont décidé qu’il était temps de la tuer.
                  - generic [ref=e2924]: Un informateur a révélé l’emplacement de Mama MVita Kimpa aux Portugais. Lorsqu’ils l’ont trouvée, ils ont arrêté et tué toutes les personnes avec elle. Elle a été emmenée seule à Divululu, une montagne, où elle a été torturée et battue sans arrêt pour qu’elle abandonne ses enseignements ancestraux.
                  - generic [ref=e2926]: Pour reprendre le contrôle sur les esprits, ses bourreaux l’ont présentée comme une personne du mal. Mais MVita Kimpa a refusé d’abandonner la mission donnée par ses ancêtres.
                  - generic [ref=e2928]: C’est pourquoi elle a été brûlée vive par les Portugais. Elle n’avait que 17 ans quand elle est morte.
                  - generic [ref=e2930]: MVita Kimpa a refusé de renier la parole de Nzambi. Elle est morte brûlée vive le 2 juillet 1706.
                  - generic [ref=e2932]: Aujourd’hui, Kimvuka kia Mvita Kimpa est une association féminine, initiatique, culturelle et socio-économique, inspirée par son héritage spirituel. Elle travaille pour le développement des femmes et pour transmettre les valeurs du Koongo dia Ntotela.
                  - generic [ref=e2934]: Un rituel appelé Ziku dia Mvita Kimpa est pratiqué, lié au feu qui l’a consumée et devenu un symbole spirituel.
                  - generic [ref=e2936]: Gloire à ces deux ancestres remarquables et femmes prêtresses.
                  - generic [ref=e2938]: 𝗞𝗮𝗹𝘂𝗻𝗴𝗮 𝗕𝗶𝘀𝗶𝗺𝗯𝗶 𝗖𝗵𝗲𝗿𝗰𝗵𝗲𝘂𝘀𝗲 𝗶𝗻𝗱𝗲́𝗽𝗲𝗻𝗱𝗮𝗻𝘁𝗲
