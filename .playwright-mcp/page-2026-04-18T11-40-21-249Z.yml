            - generic [ref=e1224]:
              - generic [ref=e1225]:
                - generic [ref=e1226]: Kinshasa, le 4 NOV.2015
                - generic [ref=e1227]: A Monsieur le commissaire spécial de la province de mai-ndombe
                - generic [ref=e1228]: "Objet : première lettre ouverte"
                - generic [ref=e1229]: Monsieur le commissaire,
                - generic [ref=e1230]: C’est avec un grand intérêt que j’ai pris connaissance de votre nomination en qualité de commissaire spécial par le Président joseph Kabila kabange par l’ordonnance n° 15/081 du 29 octobre 2015 portant nomination des commissaires spéciaux et des commissaires spéciaux adjoints du gouvernement charges d’administrer les nouvelles provinces.
                - generic [ref=e1231]: Si je me permets aujourd’hui de vous écrire cette première lettre ouverte, c’est en double qualité de charger de sensibilisation et mobilisation, conseiller juridique de l’association sans but lucratif MAI-NDOMBE PLUS, en sigle M.P a.s.b.l et ressortissant de la province de mai-ndombe.
                - generic [ref=e1232]: Votre nomination suscite un grand doute au sein de la population de mai-ndombe, c’est ainsi dans le souci d’éclairer l’opinion de cette province afin de lui permettre de mieux vous découvrir, vous connaitre et d’avoir une idée réelle de votre personne.
                - generic [ref=e1233]: Toute personne, digne fils ou fille de notre province, qui serait commissaire ou gouverneur dans ce grand mai-ndombe, devrait se sentir fière de représenter une si grande province, dotée de tous les atouts pour un destin fabuleux. En même temps, cet honneur se conjugue avec une exaltante responsabilité. Sans doute, d’autres que moi vous ont-ils déjà dit tout le mal que vous avez eu à faire lors de votre passage à l’assemble nationale cela veut dire aucun jour vous étiez devant la tribune de cette assemblée en train de faire un plaidoyer pour cette province même pas des émissions télévisée.
                - generic [ref=e1234]: Puissiez-vous prendre connaissance de ce qui se dit et se vit au sein de la population de mai-ndombe ? On le dit de plusieurs manières, parfois en murmurant, parfois en criant dans la rue.
                - generic [ref=e1235]: "Conformément aux droits qui sont reconnus à tous les citoyens congolais par la Constitution (art. 27), je prends la liberté de vous adresser la présente recommandation, dont l’intitulé est appelé à dessein : «lettre ouverte». Les principaux motifs de cette lettre se fondent sur la lassitude de notre population à l’égard d’un système qui s’occupe de tout sauf de la finalité même de l’Etat."
                - generic [ref=e1236]: Ma démarche d’une essence chrétienne pour un frère dans la foi n’étant nullement dans l’intention de vous nuire, mais celle de vous aider à changer votre image et le destin de cette grande province que vous avez la charge.
                - generic [ref=e1237]: En tant qu’un homme, crée à l’image de Dieu, et surtout selon sa ressemblance, j’ai une personnalité et dignité à préserver tant sur le plan local, national pourquoi pas international.
                - generic [ref=e1238]: Je me suis limité dans cette première lettre à vous prodiguer des conseils, dans la vérité. Je suis votre frère de mai-ndombe. Vous avez la charge d’une grande province, que je me permets de présenter pour les plus amples considérations.
              - generic [ref=e1239]:
                - generic [ref=e1240]: Mai-Ndombe, une province riche en ressources naturelles
                - generic [ref=e1241]: La nouvelle province de la République démocratique du Congo (RDC), le Mai-Ndombe, se trouve sur une nappe de pétrole dans les territoires d’Oshwe, Inongo, Kutu et Kiri. La Commission nationale de l'énergie y a découvert le Coltan à Bolobo et le diamant à Yumbi.
                - generic [ref=e1242]: Elle est constituée de deux anciens districts du Bandundu que sont Mai-Ndombe et Plateaux (territoire de Bolobo, Yumbi, Mushie et Kwamouth).
                - generic [ref=e1243]: Selon des études anciennes et récentes, le sous-sol du Mai-Ndombe possède du charbon, du diamant - dont la prospection a été réalisée et aboutie par la société américaine ESSO - dans les territoires d’Inongo et Kiri, de l’uranium dans le lac Mai-Ndombe, au large de la cité d’Inongo.
                - generic [ref=e1244]: Par ailleurs, la Commission nationale de l'énergie vient de confirmer des « suintements dans les puits d’Ilanga Kole » et un « écoulement d'hydrocarbures » dans le ruisseau Mapo et le long des failles de Bunu, Kipala, Sia, Tolo, Bombai et Nga.
                - generic [ref=e1245]: La Province de Mai-Ndombe est une province de l'ouest de la République démocratique du Congo. Anciennement dénommé district Léopold II, il a été divisé en deux districts. La partie orientale a gardé le nom de district Mai-Ndombe, la partie occidentale était désormais dénommée Plateaux.
                - generic [ref=e1246]: La province de mai-ndombe, aujourd’hui réunifiée de se deux districts, à savoir, le district de Mai-Ndombe et des Plateaux, créé le 17 juillet 1895 par arrêté royal. Le 9 août de la même année, une circulaire du Gouverneur Général fixa les frontières. Par le décret royal du 23 décembre 1901, le Roi Léopold II fit du district Lac Léopold II un domaine de La Couronne (Terre Domaniale ou terre vacante). En 1906, le chef-lieu fut transféré de Malepie (Kutu) à Inongo.
                - generic [ref=e1247]: Géographiquement, la province de Mai-Ndombe est comprise entre 16° et 20°30’ de longitude Est, de 2° et 4° de latitude Sud. Ainsi il est borné au Nord par la province de l’équateur, à l’Ouest par le fleuve Congo qui le sépare de la République du Congo, au Sud par l’affluent Kasaï et à l’Est par la province du Kasaï Occidental. Sa superficie est de 127 341 km2. Sur le plan administratif, il est subdivisé en 8 territoires, 19 secteurs et 52 groupements.
                - generic [ref=e1248]: Divisions administratives
                - generic [ref=e1249]: "L’organisation administrative de l’ex district de Mai-Ndombe, divisé en deux districts : Mai-Ndombe et Plateaux mais considéré par la population comme une seule et unique entité prête à être érigée en province dans l’optique du fédéralisme se présente comme suit :"
                - generic [ref=e1250]: Districts/Territoires Secteurs Groupements
                - generic [ref=e1251]: District Mai-Ndombe
                - generic [ref=e1252]: • INONGO
                - generic [ref=e1253]: "1. Basengele : Mbelo, Mpenge, Ngongo, Bokote"
                - generic [ref=e1254]: "2. Bolia : Ibeke, Lukanga, Nkita, Bokwala"
                - generic [ref=e1255]: "3. Inongo : Ntombanzale, Ibenga, Iyambe"
                - generic [ref=e1256]: • KIRI
                - generic [ref=e1257]: "1. Beronge : Ilanga, Bakonda, Iyembe"
                - generic [ref=e1258]: "2. Lutoy : Weli, Ngali, Ibeke, Bolongo"
                - generic [ref=e1259]: "3. Penzwa : Djombo, Lioko, Waya, Besongo, Nkondi"
                - generic [ref=e1260]: • KUTU
                - generic [ref=e1261]: "1. Kemba : Dwele, Mbantin"
                - generic [ref=e1262]: "2. Mfimi : Mabie, Mba-Ushie, Lenvina Nord, Lenvina Sud"
                - generic [ref=e1263]: "3. Luabu : Mbelo, Bobaai"
                - generic [ref=e1264]: "4. Badia : Badia"
                - generic [ref=e1265]: "5. Bateke : Batere"
                - generic [ref=e1266]: • OSHWE
                - generic [ref=e1267]: "1. Nkaw : Bokongo, Imoma, Mbiliankamba"
                - generic [ref=e1268]: "2. Lokolama : Bolendo, Bolongo"
                - generic [ref=e1269]: "3. Lukenie : Ipanga, Betito"
                - generic [ref=e1270]: "4. Kangara : Booli, Etwali"
                - generic [ref=e1271]: District des Plateaux
                - generic [ref=e1272]: "• BOLOBO : Bateke Nord, Mbee, Bwema"
                - generic [ref=e1273]: "• YUMBI : Mongama, Baboma Nord, Batende, Banunu"
                - generic [ref=e1274]: "• MUSHIE : Baboma, Banunu, Bampe Baboma Bantu,"
                - generic [ref=e1275]: "• KWAMOUTH : Bateke Sud Baboma Sud"
                - generic [ref=e1276]: Population
                - generic [ref=e1277]: "Les principales tribus qui peuplent le District sont les suivantes : Ntomba-Nzale, Sengele, Bolia, Nkundo, Dza, tow, Ekonda, Sakata, Teke, Nunu de Mushie, Bampe, Boma, Nunu-Bobangi, Tiene."
                - generic [ref=e1278]: Monsieur le commissaire spécial,
                - generic [ref=e1279]: Sans doute, vous êtes au courant que la province de mai-ndombe n’a pas bénéficié de 5 chantiers, la révolution de la modernité en marche/ la vision et idée-force du Président joseph Kabila. Il y a plusieurs secteurs que nous allons aborder dans les jours qui suive.
                - generic [ref=e1280]: "Pour le développement de la province de mai-ndombe voici les réalisations qui permettront à être compétitive vis-à-vis des autres provinces. A savoir :"
                - generic [ref=e1281]: "- La transformation sociopolitique ;"
                - generic [ref=e1282]: "- Programmes d’investissements ;"
                - generic [ref=e1283]: "- Sécurité juridique et judiciaire ;"
                - generic [ref=e1284]: "- Promotion de l’éducation et de la santé et"
                - generic [ref=e1285]: "- Infrastructures et reconstructions."
                - generic [ref=e1286]: Pour clore, en écrivant, j’ai voulu donner un relief particulier à mon effroi d’un destin de la province qui marche à pas fixes, où chaque seconde qui passe, chaque acte de nos vies respectives, chacun de nos silences rend plus certain un suicide collectif inexplicable.
                - generic [ref=e1287]: Je vous prie de croire, monsieur le commissaire spécial, l’expression de ma haute considération.
                - generic [ref=e1288]: BOLANSHI NZALI YAV bobo
                - generic [ref=e1289]: Ressortissant de mai-ndombe
